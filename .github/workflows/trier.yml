name: TRIER OZON-ONLY Workflow

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests pandas numpy
      
      - name: Fetch OZON Real Data
        env:
          OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
          OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
        run: |
          cd src
          python ozon_dashboard_data.py
      
      - name: Generate OZON Dashboard
        run: |
          cd src
          python generate_ozon_dashboard.py
      
      - name: Commit real data
        run: |
          git config --local user.email "trier@github.com"
          git config --local user.name "TRIER Bot"
          git add real_data/ozon/ docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 OZON update $(date)"
          git push
